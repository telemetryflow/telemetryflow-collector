# =============================================================================
# TelemetryFlow Collector Unified Configuration (TFO v2 Only)
# =============================================================================
# Community Enterprise Observability Platform (CEOP)
# Copyright (c) 2024-2026 TelemetryFlow. All rights reserved.
#
# This is the TFO v2-only configuration with TFO exporter enabled.
# All telemetry is authenticated and exported to TelemetryFlow Platform.
#
#   Usage: ./tfo-collector --config configs/tfo-collector-unified.yaml
#
# =============================================================================
# TFO v2 Endpoints (Authenticated - REQUIRED HEADERS):
# =============================================================================
#
#   HTTP Endpoints:
#     Headers Required:
#       X-TelemetryFlow-Key-ID: tfk_xxx
#       X-TelemetryFlow-Key-Secret: tfs_xxx
#
#     POST http://localhost:4318/v2/traces
#     POST http://localhost:4318/v2/metrics
#     POST http://localhost:4318/v2/logs
#
#   gRPC Endpoint:
#     localhost:4317 (with metadata: x-telemetryflow-key-id, x-telemetryflow-key-secret)
#
# =============================================================================
# Environment Variables (REQUIRED)
# =============================================================================
#   TELEMETRYFLOW_API_KEY_ID      - API Key ID (tfk_xxx)
#   TELEMETRYFLOW_API_KEY_SECRET  - API Key Secret (tfs_xxx)
#   TELEMETRYFLOW_ENDPOINT        - TelemetryFlow backend (default: https://api.telemetryflow.id)
#
# Optional:
#   TELEMETRYFLOW_COLLECTOR_ID    - Unique collector identifier (auto-generated if empty)
#   TELEMETRYFLOW_COLLECTOR_NAME  - Human-readable collector name
#   TELEMETRYFLOW_ENVIRONMENT     - Deployment environment (default: production)
#   TELEMETRYFLOW_DATACENTER      - Datacenter identifier
#
# =============================================================================

# =============================================================================
# EXTENSIONS - TFO Authentication and Identity
# =============================================================================
extensions:
  # Health check extension
  health_check:
    endpoint: "0.0.0.0:13133"

  # zPages extension for debugging
  zpages:
    endpoint: "0.0.0.0:55679"

  # pprof extension for profiling
  pprof:
    endpoint: "0.0.0.0:1777"

  # TFO Authentication Extension - API key management for TFO Platform
  tfoauth:
    api_key_id: "${env:TELEMETRYFLOW_API_KEY_ID}"
    api_key_secret: "${env:TELEMETRYFLOW_API_KEY_SECRET}"

  # TFO Identity Extension - Collector identity and resource enrichment
  tfoidentity:
    id: "${env:TELEMETRYFLOW_COLLECTOR_ID}"
    name: "${env:TELEMETRYFLOW_COLLECTOR_NAME:-TFO Unified Collector}"
    description: "TelemetryFlow Unified Collector - TFO v2 Only Mode"
    tags:
      environment: "${env:TELEMETRYFLOW_ENVIRONMENT:-production}"
      datacenter: "${env:TELEMETRYFLOW_DATACENTER:-default}"
      mode: unified-v2
    enrich_resources: true

# =============================================================================
# RECEIVERS - TFO v2 Authenticated Endpoints Only
# =============================================================================
receivers:
  # TFO OTLP Receiver - v2 endpoints with mandatory authentication
  tfootlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
        max_recv_msg_size_mib: 4
      http:
        endpoint: "0.0.0.0:4318"
        transport: tcp
        cors:
          allowed_origins:
            - "*"
          allowed_headers:
            - "*"
            - "X-TelemetryFlow-Key-ID"
            - "X-TelemetryFlow-Key-Secret"
    # v2 Only Mode - Authentication Required
    enable_v2_endpoints: true
    v2_only: true
    v2_auth:
      required: true
      validate_secret: true

# =============================================================================
# PROCESSORS - Optimized for TFO Platform
# =============================================================================
processors:
  # Batch processor for efficient data handling
  batch:
    timeout: 200ms
    send_batch_size: 8192
    send_batch_max_size: 0

  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

  # Resource processor - TFO Platform resource attributes
  resource:
    attributes:
      - key: service.namespace
        value: telemetryflow
        action: upsert
      - key: deployment.environment
        value: "${env:TELEMETRYFLOW_ENVIRONMENT:-production}"
        action: upsert
      - key: telemetryflow.collector.mode
        value: unified-v2
        action: upsert

  # Resource detection for automatic enrichment
  resourcedetection:
    detectors: [env, system, docker]
    timeout: 5s
    override: false

  # TFO-Agent: Normalize cAdvisor Prometheus-style metric names (container_* → container.cadvisor.*)
  # Handles the cAdvisor collector which scrapes /metrics from cAdvisor or kubelet proxy.
  transform/cadvisor:
    error_mode: ignore
    metric_statements:
      - context: metric
        statements:
          # CPU
          - replace_pattern(name, "^container_cpu_usage_seconds_total$", "container.cadvisor.cpu.usage_seconds_total")
          - replace_pattern(name, "^container_cpu_system_seconds_total$", "container.cadvisor.cpu.system_seconds_total")
          - replace_pattern(name, "^container_cpu_user_seconds_total$", "container.cadvisor.cpu.user_seconds_total")
          - replace_pattern(name, "^container_cpu_cfs_throttled_seconds_total$", "container.cadvisor.cpu.cfs.throttled_seconds_total")
          - replace_pattern(name, "^container_cpu_cfs_periods_total$", "container.cadvisor.cpu.cfs.periods_total")
          - replace_pattern(name, "^container_cpu_cfs_throttled_periods_total$", "container.cadvisor.cpu.cfs.throttled_periods_total")
          # Memory
          - replace_pattern(name, "^container_memory_usage_bytes$", "container.cadvisor.memory.usage_bytes")
          - replace_pattern(name, "^container_memory_working_set_bytes$", "container.cadvisor.memory.working_set_bytes")
          - replace_pattern(name, "^container_memory_rss$", "container.cadvisor.memory.rss_bytes")
          - replace_pattern(name, "^container_memory_cache$", "container.cadvisor.memory.cache_bytes")
          - replace_pattern(name, "^container_memory_swap$", "container.cadvisor.memory.swap_bytes")
          - replace_pattern(name, "^container_memory_failures_total$", "container.cadvisor.memory.failures_total")
          # Network
          - replace_pattern(name, "^container_network_receive_bytes_total$", "container.cadvisor.network.receive_bytes_total")
          - replace_pattern(name, "^container_network_transmit_bytes_total$", "container.cadvisor.network.transmit_bytes_total")
          - replace_pattern(name, "^container_network_receive_errors_total$", "container.cadvisor.network.receive_errors_total")
          - replace_pattern(name, "^container_network_transmit_errors_total$", "container.cadvisor.network.transmit_errors_total")
          - replace_pattern(name, "^container_network_receive_packets_dropped_total$", "container.cadvisor.network.receive_drops_total")
          - replace_pattern(name, "^container_network_transmit_packets_dropped_total$", "container.cadvisor.network.transmit_drops_total")
          # Filesystem
          - replace_pattern(name, "^container_fs_usage_bytes$", "container.cadvisor.fs.usage_bytes")
          - replace_pattern(name, "^container_fs_limit_bytes$", "container.cadvisor.fs.limit_bytes")
          - replace_pattern(name, "^container_fs_reads_bytes_total$", "container.cadvisor.fs.read_bytes_total")
          - replace_pattern(name, "^container_fs_writes_bytes_total$", "container.cadvisor.fs.write_bytes_total")
          # Machine
          - replace_pattern(name, "^machine_cpu_cores$", "machine.cpu.cores")
          - replace_pattern(name, "^machine_memory_bytes$", "machine.memory.bytes")
          - replace_pattern(name, "^machine_cpu_cache_capacity_kilobytes$", "machine.cpu.cache.capacity_kilobytes")

  # TFO-Agent: Normalize Cilium Hubble Prometheus-style metric names (hubble_* → hubble.*)
  # Handles eBPF collector's Cilium Hubble sub-collector metrics.
  transform/hubble:
    error_mode: ignore
    metric_statements:
      - context: metric
        statements:
          - replace_pattern(name, "^hubble_flows_processed_total$", "hubble.flows.processed_total")
          - replace_pattern(name, "^hubble_drop_total$", "hubble.drop_total")
          - replace_pattern(name, "^hubble_tcp_flags_total$", "hubble.tcp.flags_total")
          - replace_pattern(name, "^hubble_dns_queries_total$", "hubble.dns.queries_total")
          - replace_pattern(name, "^hubble_dns_responses_total$", "hubble.dns.responses_total")
          - replace_pattern(name, "^hubble_http_requests_total$", "hubble.http.requests_total")
          - replace_pattern(name, "^hubble_http_responses_total$", "hubble.http.responses_total")
          - replace_pattern(name, "^hubble_http_request_duration_seconds$", "hubble.http.request_duration_seconds")

  # TFO-Agent: Group Kubernetes metrics by their resource identity attributes.
  groupbyattrs/k8s:
    keys:
      - k8s.namespace.name
      - k8s.pod.name
      - k8s.node.name
      - k8s.deployment.name
      - k8s.container.name
      - k8s.statefulset.name
      - k8s.daemonset.name
      - k8s.replicaset.name
      - k8s.job.name
      - k8s.cronjob.name

  # TFO-Agent: Tag all agent-sourced telemetry for platform-side identification.
  attributes/agent:
    actions:
      - key: tfo.source
        value: "tfo-agent"
        action: insert

# =============================================================================
# CONNECTORS - Pipeline bridging for Exemplars and derived metrics
# =============================================================================
connectors:
  # Span metrics connector - derives metrics from traces with EXEMPLARS support
  spanmetrics:
    histogram:
      explicit:
        buckets: [1ms, 5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    dimensions:
      - name: http.method
        default: GET
      - name: http.status_code
      - name: http.route
      - name: rpc.method
      - name: rpc.service
    exemplars:
      enabled: true
    namespace: traces
    metrics_flush_interval: 15s

  # Service graph connector - builds service dependency graphs from traces
  servicegraph:
    latency_histogram_buckets: [1ms, 5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    dimensions:
      - http.method
      - http.status_code
    store:
      ttl: 2s
      max_items: 1000
    cache_loop: 1s
    store_expiration_loop: 2s
    virtual_node_peer_attributes:
      - db.system
      - messaging.system
      - rpc.service

# =============================================================================
# EXPORTERS - TFO Platform Export
# =============================================================================
exporters:
  # Debug exporter (minimal verbosity for production)
  debug:
    verbosity: basic
    sampling_initial: 2
    sampling_thereafter: 500

  # Prometheus exporter for local metrics scraping (with exemplars support)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: telemetryflow
    const_labels:
      collector: tfo-unified
      mode: v2-only
    send_timestamps: true
    metric_expiration: 5m
    enable_open_metrics: true
    resource_to_telemetry_conversion:
      enabled: true

  # TFO Platform Exporter - Primary export destination
  # Auto-injects TFO auth headers using tfoauth extension
  tfo:
    endpoint: "${env:TELEMETRYFLOW_ENDPOINT:-https://api.telemetryflow.id}"
    use_v2_api: true
    auth:
      extension: tfoauth
    collector_identity: tfoidentity
    timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000
    compression: gzip
    headers:
      User-Agent: "TFO-Collector-Unified/1.1.8"

  # TFO Exporter for Traces (dedicated instance with trace-specific settings)
  tfo/traces:
    endpoint: "${env:TELEMETRYFLOW_ENDPOINT:-https://api.telemetryflow.id}"
    use_v2_api: true
    auth:
      extension: tfoauth
    collector_identity: tfoidentity
    timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 2000
    compression: gzip

  # TFO Exporter for Metrics (dedicated instance with metrics-specific settings)
  tfo/metrics:
    endpoint: "${env:TELEMETRYFLOW_ENDPOINT:-https://api.telemetryflow.id}"
    use_v2_api: true
    auth:
      extension: tfoauth
    collector_identity: tfoidentity
    timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 5
      queue_size: 1000
    compression: gzip

  # TFO Exporter for Logs (dedicated instance with logs-specific settings)
  tfo/logs:
    endpoint: "${env:TELEMETRYFLOW_ENDPOINT:-https://api.telemetryflow.id}"
    use_v2_api: true
    auth:
      extension: tfoauth
    collector_identity: tfoidentity
    timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 5
      queue_size: 1500
    compression: gzip

# =============================================================================
# SERVICE - TFO v2 Unified Pipelines
# =============================================================================
service:
  extensions: [health_check, zpages, pprof, tfoauth, tfoidentity]

  pipelines:
    # Traces pipeline - TFO v2 authenticated traces
    traces:
      receivers: [tfootlp]
      processors: [memory_limiter, resourcedetection, resource, attributes/agent, batch]
      exporters: [debug, tfo/traces, spanmetrics, servicegraph]

    # Metrics pipeline - receives ALL TFO-Agent collector metrics via TFO v2 authenticated endpoint.
    # Covers all 16 collectors: k8s-nodes, k8s-pods, k8s-deployments, k8s-workloads,
    # k8s-storage, k8s-network, k8s-hpa, k8s-pdb, k8s-events, k8s-resource-counts,
    # system, node-exporter, docker, cadvisor, ebpf (metrics), and app metrics.
    metrics:
      receivers: [tfootlp]
      processors:
        - memory_limiter
        - resourcedetection   # auto-detect host/cloud/docker resource attributes
        - groupbyattrs/k8s    # scope K8s collector metrics to their resource identity
        - resource            # add service.namespace, deployment.environment
        - transform/cadvisor  # normalize cAdvisor Prometheus names → container.cadvisor.*
        - transform/hubble    # normalize Hubble Prometheus names → hubble.*
        - attributes/agent    # tag all agent-sourced telemetry with tfo.source=tfo-agent
        - batch
      exporters: [debug, tfo/metrics, prometheus]

    # Metrics from traces pipeline - derived metrics with EXEMPLARS
    metrics/spanmetrics:
      receivers: [spanmetrics]
      processors: [memory_limiter, batch]
      exporters: [tfo/metrics, prometheus]

    # Metrics from service graph - service dependency metrics
    metrics/servicegraph:
      receivers: [servicegraph]
      processors: [memory_limiter, batch]
      exporters: [tfo/metrics, prometheus]

    # Logs pipeline - receives pod container logs (k8s-pod-logs collector) and
    # eBPF Hubble network flow events from TFO-Agent via TFO v2 authenticated endpoint.
    logs:
      receivers: [tfootlp]
      processors:
        - memory_limiter
        - resourcedetection  # auto-detect host context for pod logs
        - resource           # add service.namespace, deployment.environment
        - attributes/agent   # tag with tfo.source=tfo-agent
        - batch
      exporters: [debug, tfo/logs]

  # Internal telemetry configuration
  telemetry:
    logs:
      level: info
      encoding: json

    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888
