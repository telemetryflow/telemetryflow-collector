# =============================================================================
# TelemetryFlow Collector — Agent-Optimized Configuration (v1.1.6)
# =============================================================================
# Community Enterprise Observability Platform (CEOP)
# Copyright (c) 2024-2026 TelemetryFlow. All rights reserved.
#
# Specialized configuration for receiving all TFO-Agent collector output.
# Optimized for the full set of 16 collectors across 5 domains:
#
#   Kubernetes (11 collectors):
#     k8s-nodes       → k8s.node.*   metrics  (Kubernetes API + metrics-server + Kubelet)
#     k8s-pods        → k8s.pod.*    metrics  (Kubernetes API + metrics-server + Kubelet)
#     k8s-deployments → k8s.deployment.* metrics  (Kubernetes API)
#     k8s-workloads   → k8s.statefulset/daemonset/replicaset/job/cronjob.* metrics
#     k8s-storage     → k8s.pv.*/k8s.pvc.* metrics  (Kubernetes API)
#     k8s-network     → k8s.namespace.network.* metrics  (Kubelet summary)
#     k8s-hpa         → k8s.hpa.* metrics  (Kubernetes API autoscaling/v2)
#     k8s-pdb         → k8s.pdb.* metrics  (Kubernetes API policy/v1)
#     k8s-events      → k8s.event.* metrics  (Kubernetes API v1/events)
#     k8s-resource-counts → k8s.secret/configmap/ingress.count metrics
#     k8s-pod-logs    → OTLP logs  (Kubernetes API pod/log endpoint)
#
#   Host (2 collectors):
#     system          → system.* metrics  (lightweight host metrics + heartbeat)
#     node-exporter   → node.* metrics  (100+ metrics: CPU/mem/disk/net/load/thermal)
#
#   Container (2 collectors):
#     docker          → container.* metrics  (Docker Engine API)
#     cadvisor        → container.cadvisor.*/machine.* metrics  (Prometheus scrape, normalized)
#
#   Kernel (1 collector):
#     ebpf            → ebpf.* metrics  (eBPF: syscalls/TCP/UDP/fileio/sched/mem)
#                       hubble.* metrics  (Cilium Hubble, normalized from hubble_*)
#
#   Note: Heartbeat/registration goes directly to TFO Platform API — not via collector.
#
#   Usage: ./tfo-collector --config configs/tfo-collector-agent.yaml
#
# =============================================================================
# TFO v2 Endpoints (Authenticated — headers required from TFO-Agent):
#   X-TelemetryFlow-Key-ID:     tfk_xxx
#   X-TelemetryFlow-Key-Secret: tfs_xxx
#
#   POST http://tfo-collector:4318/v2/metrics  (all 16 metric collectors)
#   POST http://tfo-collector:4318/v2/logs     (k8s-pod-logs + eBPF Hubble events)
#   grpc  tfo-collector:4317                   (gRPC with metadata headers)
#
# =============================================================================
# Environment Variables (REQUIRED)
# =============================================================================
#   TELEMETRYFLOW_API_KEY_ID      - API Key ID (tfk_xxx)
#   TELEMETRYFLOW_API_KEY_SECRET  - API Key Secret (tfs_xxx)
#   TELEMETRYFLOW_ENDPOINT        - TFO Platform backend (default: https://api.telemetryflow.id)
#
# Optional:
#   TELEMETRYFLOW_COLLECTOR_ID    - Unique collector identifier (auto-generated if empty)
#   TELEMETRYFLOW_COLLECTOR_NAME  - Human-readable collector name
#   TELEMETRYFLOW_ENVIRONMENT     - Deployment environment (default: production)
#   TELEMETRYFLOW_DATACENTER      - Datacenter identifier
# =============================================================================

# =============================================================================
# EXTENSIONS
# =============================================================================
extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

  zpages:
    endpoint: "0.0.0.0:55679"

  pprof:
    endpoint: "0.0.0.0:1777"

  # TFO Authentication — credentials injected from agent or env vars
  tfoauth:
    api_key_id: "${env:TELEMETRYFLOW_API_KEY_ID}"
    api_key_secret: "${env:TELEMETRYFLOW_API_KEY_SECRET}"

  # TFO Identity — collector identity and resource attribute enrichment
  tfoidentity:
    id: "${env:TELEMETRYFLOW_COLLECTOR_ID}"
    name: "${env:TELEMETRYFLOW_COLLECTOR_NAME:-TFO Agent Collector}"
    description: "TelemetryFlow Collector — Agent-Optimized Mode"
    tags:
      environment: "${env:TELEMETRYFLOW_ENVIRONMENT:-production}"
      datacenter: "${env:TELEMETRYFLOW_DATACENTER:-default}"
      mode: agent-optimized
    enrich_resources: true

# =============================================================================
# RECEIVERS
# =============================================================================
receivers:
  # TFO OTLP Receiver — accepts all TFO-Agent OTLP output (gRPC + HTTP, v1 + v2)
  tfootlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
        max_recv_msg_size_mib: 8  # increased for large K8s metric batches
      http:
        endpoint: "0.0.0.0:4318"
        transport: tcp
        cors:
          allowed_origins:
            - "*"
          allowed_headers:
            - "*"
            - "X-TelemetryFlow-Key-ID"
            - "X-TelemetryFlow-Key-Secret"
    enable_v2_endpoints: true
    v2_auth:
      required: true
      validate_secret: true

# =============================================================================
# PROCESSORS
# =============================================================================
processors:
  # Memory limiter — always first
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

  # Resource detection — auto-detect host, cloud, and container context.
  # Enriches system/node-exporter/docker/cadvisor/ebpf metrics with host.name,
  # cloud.provider, cloud.region, container.runtime, etc.
  resourcedetection:
    detectors: [env, system, docker, gcp, aws, azure]
    timeout: 5s
    override: false

  # Resource — add TFO platform-standard resource attributes
  resource:
    attributes:
      - key: service.namespace
        value: telemetryflow
        action: upsert
      - key: deployment.environment
        value: "${env:TELEMETRYFLOW_ENVIRONMENT:-production}"
        action: upsert
      - key: telemetryflow.collector.mode
        value: agent-optimized
        action: upsert

  # ==========================================================================
  # TFO-Agent: Kubernetes metric resource grouping
  # ==========================================================================
  # Groups K8s collector metrics by their resource identity so each metric is
  # scoped to the correct Kubernetes object. Applies to:
  #   k8s-nodes, k8s-pods, k8s-deployments, k8s-workloads, k8s-storage,
  #   k8s-network, k8s-hpa, k8s-pdb, k8s-events, k8s-resource-counts
  groupbyattrs/k8s:
    keys:
      - k8s.cluster.name
      - k8s.namespace.name
      - k8s.node.name
      - k8s.pod.name
      - k8s.container.name
      - k8s.deployment.name
      - k8s.statefulset.name
      - k8s.daemonset.name
      - k8s.replicaset.name
      - k8s.job.name
      - k8s.cronjob.name

  # ==========================================================================
  # TFO-Agent: cAdvisor metric normalization
  # ==========================================================================
  # Converts Prometheus-style names scraped by the cAdvisor collector to TFO
  # dot-notation conventions. Non-cAdvisor metrics pass through unchanged
  # (error_mode: ignore).
  #
  # Collector: cadvisor → endpoint: http://localhost:8080/metrics
  #   (or kubelet proxy: /api/v1/nodes/{name}/proxy/metrics/cadvisor)
  # Output: container.cadvisor.* and machine.*
  transform/cadvisor:
    error_mode: ignore
    metric_statements:
      - context: metric
        statements:
          # CPU (container_cpu_* → container.cadvisor.cpu.*)
          - replace_pattern(name, "^container_cpu_usage_seconds_total$", "container.cadvisor.cpu.usage_seconds_total")
          - replace_pattern(name, "^container_cpu_system_seconds_total$", "container.cadvisor.cpu.system_seconds_total")
          - replace_pattern(name, "^container_cpu_user_seconds_total$", "container.cadvisor.cpu.user_seconds_total")
          - replace_pattern(name, "^container_cpu_cfs_throttled_seconds_total$", "container.cadvisor.cpu.cfs.throttled_seconds_total")
          - replace_pattern(name, "^container_cpu_cfs_periods_total$", "container.cadvisor.cpu.cfs.periods_total")
          - replace_pattern(name, "^container_cpu_cfs_throttled_periods_total$", "container.cadvisor.cpu.cfs.throttled_periods_total")
          # Memory (container_memory_* → container.cadvisor.memory.*)
          - replace_pattern(name, "^container_memory_usage_bytes$", "container.cadvisor.memory.usage_bytes")
          - replace_pattern(name, "^container_memory_working_set_bytes$", "container.cadvisor.memory.working_set_bytes")
          - replace_pattern(name, "^container_memory_rss$", "container.cadvisor.memory.rss_bytes")
          - replace_pattern(name, "^container_memory_cache$", "container.cadvisor.memory.cache_bytes")
          - replace_pattern(name, "^container_memory_swap$", "container.cadvisor.memory.swap_bytes")
          - replace_pattern(name, "^container_memory_failures_total$", "container.cadvisor.memory.failures_total")
          # Network (container_network_* → container.cadvisor.network.*)
          - replace_pattern(name, "^container_network_receive_bytes_total$", "container.cadvisor.network.receive_bytes_total")
          - replace_pattern(name, "^container_network_transmit_bytes_total$", "container.cadvisor.network.transmit_bytes_total")
          - replace_pattern(name, "^container_network_receive_errors_total$", "container.cadvisor.network.receive_errors_total")
          - replace_pattern(name, "^container_network_transmit_errors_total$", "container.cadvisor.network.transmit_errors_total")
          - replace_pattern(name, "^container_network_receive_packets_dropped_total$", "container.cadvisor.network.receive_drops_total")
          - replace_pattern(name, "^container_network_transmit_packets_dropped_total$", "container.cadvisor.network.transmit_drops_total")
          # Filesystem (container_fs_* → container.cadvisor.fs.*)
          - replace_pattern(name, "^container_fs_usage_bytes$", "container.cadvisor.fs.usage_bytes")
          - replace_pattern(name, "^container_fs_limit_bytes$", "container.cadvisor.fs.limit_bytes")
          - replace_pattern(name, "^container_fs_reads_bytes_total$", "container.cadvisor.fs.read_bytes_total")
          - replace_pattern(name, "^container_fs_writes_bytes_total$", "container.cadvisor.fs.write_bytes_total")
          # Machine (machine_* → machine.*)
          - replace_pattern(name, "^machine_cpu_cores$", "machine.cpu.cores")
          - replace_pattern(name, "^machine_memory_bytes$", "machine.memory.bytes")
          - replace_pattern(name, "^machine_cpu_cache_capacity_kilobytes$", "machine.cpu.cache.capacity_kilobytes")

  # ==========================================================================
  # TFO-Agent: Cilium Hubble metric normalization
  # ==========================================================================
  # Converts Prometheus-style names from the eBPF collector's Cilium Hubble
  # sub-collector to TFO dot-notation conventions.
  #
  # Collector: ebpf → cilium.hubble_endpoint: localhost:4245
  # Output: hubble.* (normalized from hubble_*)
  transform/hubble:
    error_mode: ignore
    metric_statements:
      - context: metric
        statements:
          - replace_pattern(name, "^hubble_flows_processed_total$", "hubble.flows.processed_total")
          - replace_pattern(name, "^hubble_drop_total$", "hubble.drop_total")
          - replace_pattern(name, "^hubble_tcp_flags_total$", "hubble.tcp.flags_total")
          - replace_pattern(name, "^hubble_dns_queries_total$", "hubble.dns.queries_total")
          - replace_pattern(name, "^hubble_dns_responses_total$", "hubble.dns.responses_total")
          - replace_pattern(name, "^hubble_http_requests_total$", "hubble.http.requests_total")
          - replace_pattern(name, "^hubble_http_responses_total$", "hubble.http.responses_total")
          - replace_pattern(name, "^hubble_http_request_duration_seconds$", "hubble.http.request_duration_seconds")

  # ==========================================================================
  # TFO-Agent: Universal source tagging
  # ==========================================================================
  # Tags all telemetry with tfo.source=tfo-agent so the platform can
  # differentiate agent-collected data from app-instrumented data.
  attributes/agent:
    actions:
      - key: tfo.source
        value: "tfo-agent"
        action: insert

  # Batch — always last before export
  batch:
    timeout: 200ms
    send_batch_size: 8192
    send_batch_max_size: 0

# =============================================================================
# CONNECTORS — Trace-derived metrics with Exemplars
# =============================================================================
connectors:
  spanmetrics:
    histogram:
      explicit:
        buckets: [1ms, 5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    dimensions:
      - name: http.method
        default: GET
      - name: http.status_code
      - name: http.route
      - name: rpc.method
      - name: rpc.service
    exemplars:
      enabled: true
    namespace: traces
    metrics_flush_interval: 15s

  servicegraph:
    latency_histogram_buckets: [1ms, 5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    dimensions:
      - http.method
      - http.status_code
    store:
      ttl: 2s
      max_items: 1000
    cache_loop: 1s
    store_expiration_loop: 2s
    virtual_node_peer_attributes:
      - db.system
      - messaging.system
      - rpc.service

# =============================================================================
# EXPORTERS
# =============================================================================
exporters:
  debug:
    verbosity: basic
    sampling_initial: 2
    sampling_thereafter: 500

  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: telemetryflow
    const_labels:
      collector: tfo-agent-collector
      mode: agent-optimized
    send_timestamps: true
    metric_expiration: 5m
    enable_open_metrics: true
    resource_to_telemetry_conversion:
      enabled: true

  # TFO Platform exporter for metrics — larger queue for high-volume agent batches
  tfo/metrics:
    endpoint: "${env:TELEMETRYFLOW_ENDPOINT:-https://api.telemetryflow.id}"
    use_v2_api: true
    auth:
      extension: tfoauth
    collector_identity: tfoidentity
    timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 2000   # larger queue for 16-collector metric volume
    compression: gzip
    headers:
      User-Agent: "TFO-Collector-Agent/1.1.6"

  # TFO Platform exporter for logs (pod logs + eBPF Hubble events)
  tfo/logs:
    endpoint: "${env:TELEMETRYFLOW_ENDPOINT:-https://api.telemetryflow.id}"
    use_v2_api: true
    auth:
      extension: tfoauth
    collector_identity: tfoidentity
    timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 5
      queue_size: 2000   # larger queue for pod logs from all namespaces
    compression: gzip
    headers:
      User-Agent: "TFO-Collector-Agent/1.1.6"

  # TFO Platform exporter for traces (app instrumentation, spanmetrics, servicegraph)
  tfo/traces:
    endpoint: "${env:TELEMETRYFLOW_ENDPOINT:-https://api.telemetryflow.id}"
    use_v2_api: true
    auth:
      extension: tfoauth
    collector_identity: tfoidentity
    timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 2000
    compression: gzip
    headers:
      User-Agent: "TFO-Collector-Agent/1.1.6"

# =============================================================================
# SERVICE — Agent-Optimized Pipelines
# =============================================================================
service:
  extensions: [health_check, zpages, pprof, tfoauth, tfoidentity]

  pipelines:
    # ------------------------------------------------------------------
    # Application traces (spanmetrics → exemplar correlation)
    # ------------------------------------------------------------------
    traces:
      receivers: [tfootlp]
      processors: [memory_limiter, resourcedetection, resource, attributes/agent, batch]
      exporters: [debug, tfo/traces, spanmetrics, servicegraph]

    # ------------------------------------------------------------------
    # All TFO-Agent metric collectors → TFO Platform
    # ------------------------------------------------------------------
    # Signal coverage by collector:
    #   k8s.node.*              — k8s-nodes (Kubernetes API + metrics-server + Kubelet)
    #   k8s.pod.*               — k8s-pods  (Kubernetes API + metrics-server + Kubelet)
    #   k8s.deployment.*        — k8s-deployments
    #   k8s.statefulset/daemon/replicaset/job/cronjob.* — k8s-workloads
    #   k8s.pv.* / k8s.pvc.*   — k8s-storage
    #   k8s.namespace.network.* — k8s-network (Kubelet summary)
    #   k8s.hpa.*               — k8s-hpa
    #   k8s.pdb.*               — k8s-pdb
    #   k8s.event.*             — k8s-events
    #   k8s.secret/configmap/ingress.count — k8s-resource-counts
    #   system.*                — system (lightweight host)
    #   node.*                  — node-exporter (100+ host metrics)
    #   container.*             — docker (Docker Engine API)
    #   container.cadvisor.*    — cadvisor (Prometheus scrape, normalized here)
    #   machine.*               — cadvisor machine metrics (normalized here)
    #   ebpf.*                  — ebpf (syscalls, TCP/UDP, fileio, sched, memory, TCP state)
    #   hubble.*                — ebpf/cilium-hubble (normalized here from hubble_*)
    metrics:
      receivers: [tfootlp]
      processors:
        - memory_limiter
        - resourcedetection   # host/cloud/docker context for system/node-exporter/docker/cadvisor/ebpf
        - groupbyattrs/k8s    # scope K8s metrics to correct resource identity
        - resource            # add service.namespace, deployment.environment
        - transform/cadvisor  # normalize container_* / machine_* → container.cadvisor.* / machine.*
        - transform/hubble    # normalize hubble_* → hubble.*
        - attributes/agent    # tag with tfo.source=tfo-agent
        - batch
      exporters: [debug, tfo/metrics, prometheus]

    # Trace-derived metrics with exemplars
    metrics/spanmetrics:
      receivers: [spanmetrics]
      processors: [memory_limiter, batch]
      exporters: [tfo/metrics, prometheus]

    # Service dependency graph metrics
    metrics/servicegraph:
      receivers: [servicegraph]
      processors: [memory_limiter, batch]
      exporters: [tfo/metrics, prometheus]

    # ------------------------------------------------------------------
    # Pod container logs (k8s-pod-logs) + eBPF Hubble flow events
    # ------------------------------------------------------------------
    # k8s-pod-logs: Collects last N lines per container from running pods.
    #   Log body: raw string lines from container stdout/stderr.
    #   Resource attributes: k8s.namespace.name, k8s.pod.name, k8s.container.name
    #
    # eBPF Hubble: Network flow events forwarded as OTLP log records.
    #   Resource attributes: host.name, k8s.namespace.name
    logs:
      receivers: [tfootlp]
      processors:
        - memory_limiter
        - resourcedetection  # host context for pod logs and eBPF events
        - resource           # add service.namespace, deployment.environment
        - attributes/agent   # tag with tfo.source=tfo-agent
        - batch
      exporters: [debug, tfo/logs]

  telemetry:
    logs:
      level: info
      encoding: json
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888
