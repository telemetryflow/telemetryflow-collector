# GolangCI-Lint Configuration (v2)
# TelemetryFlow Collector - AI-Powered Observability & Incident Response Management (IRM) Platform

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - staticcheck
    - govet
    - errcheck
    - ineffassign
    - unused
  exclusions:
    paths:
      - vendor

  settings:
    staticcheck:
      checks:
        - "all"
        - "-SA1019"
