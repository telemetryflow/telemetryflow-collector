---
# TFO-Collector Deployment
# Runs as a single (scalable) Deployment — OTLP gateway receiving traces/metrics/logs
# from instrumented applications and forwarding to the TFO Platform backend.
#
# Pre-requisites:
#   kubectl create secret generic tfo-collector-credentials \
#     --from-literal=api-key-id=tfk_xxx \
#     --from-literal=api-key-secret=tfs_xxx \
#     -n telemetryflow

apiVersion: apps/v1
kind: Deployment
metadata:
  name: tfo-collector
  namespace: telemetryflow
  labels:
    app.kubernetes.io/name: tfo-collector
    app.kubernetes.io/component: collector
    app.kubernetes.io/part-of: telemetryflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tfo-collector
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tfo-collector
        app.kubernetes.io/component: collector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8888"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: tfo-collector
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30

      # Wait for tfo-backend to be ready before starting the collector.
      # Prevents auth failures and queue buildup on cluster cold-start.
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://tfo-backend.telemetryflow.svc.cluster.local:3100/health >/dev/null 2>&1; do
                echo "Waiting for tfo-backend..."; sleep 5
              done
              echo "tfo-backend is ready."
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      containers:
        - name: tfo-collector
          image: telemetryflow/telemetryflow-collector:1.1.8
          imagePullPolicy: Always

          args:
            - -c
            - /etc/tfo-collector/tfo-collector.yaml

          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP
            - name: prom-exp
              containerPort: 8889
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
            - name: zpages
              containerPort: 55679
              protocol: TCP
            - name: pprof
              containerPort: 1777
              protocol: TCP

          env:
            # Pod identity
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

            # TFO Platform endpoint — must point to backend REST API (NOT the OTLP collector port)
            # Format: http://<backend-service>:<port>/api/v2 (in-cluster)
            #         https://api.telemetryflow.id (external)
            - name: TELEMETRYFLOW_ENDPOINT
              value: "http://tfo-backend.telemetryflow.svc.cluster.local:3100/api/v2"

            # API credentials from Secret
            # Create secret: kubectl create secret generic tfo-collector-credentials \
            #   --from-literal=api-key-id=tfk_xxx \
            #   --from-literal=api-key-secret=tfs_xxx \
            #   -n telemetryflow
            - name: TELEMETRYFLOW_API_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: tfo-collector-credentials
                  key: api-key-id
                  optional: false
            - name: TELEMETRYFLOW_API_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: tfo-collector-credentials
                  key: api-key-secret
                  optional: false

            # Collector identity
            - name: TELEMETRYFLOW_COLLECTOR_ID
              value: ""    # auto-generated UUID if empty
            - name: TELEMETRYFLOW_COLLECTOR_NAME
              value: "tfo-collector"
            - name: TELEMETRYFLOW_ENVIRONMENT
              value: "production"
            - name: TELEMETRYFLOW_DATACENTER
              value: "default"

            # Processing tuning
            - name: TELEMETRYFLOW_BATCH_SIZE
              value: "8192"
            - name: TELEMETRYFLOW_BATCH_TIMEOUT
              value: "200ms"
            - name: TELEMETRYFLOW_MEMORY_LIMIT_PERCENTAGE
              value: "80"

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          # startupProbe: up to 90s (18×5s) for cold start
          startupProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 18

          livenessProbe:
            httpGet:
              path: /
              port: 13133
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          volumeMounts:
            - name: config
              mountPath: /etc/tfo-collector
              readOnly: true
            - name: queue
              mountPath: /var/lib/tfo-collector/queue

          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      volumes:
        - name: config
          configMap:
            name: tfo-collector-config
        - name: queue
          emptyDir:
            sizeLimit: 500Mi
