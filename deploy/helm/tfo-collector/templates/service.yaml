apiVersion: v1
kind: Service
metadata:
  name: {{ include "tfo-collector.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tfo-collector.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "tfo-collector.selectorLabels" . | nindent 4 }}
  ports:
    - name: otlp-grpc
      port: {{ .Values.ports.otlpGrpc }}
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: {{ .Values.ports.otlpHttp }}
      targetPort: otlp-http
      protocol: TCP
    - name: metrics
      port: {{ .Values.ports.metrics }}
      targetPort: metrics
      protocol: TCP
    - name: prom-exp
      port: {{ .Values.ports.prometheusExporter }}
      targetPort: prom-exp
      protocol: TCP
    - name: health
      port: {{ .Values.ports.health }}
      targetPort: health
      protocol: TCP
    - name: zpages
      port: {{ .Values.ports.zpages }}
      targetPort: zpages
      protocol: TCP
