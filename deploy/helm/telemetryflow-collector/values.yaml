# TFO-Collector Helm Chart Values

# -- TFO Platform connection settings (REQUIRED)
telemetryflow:
  # -- TFO Platform API endpoint (e.g. https://platform.example.com/api/v2)
  endpoint: ""
  # -- API key ID (from TFO Platform → Settings → API Keys)
  apiKeyId: ""
  # -- API key secret
  apiKeySecret: ""
  # -- Workspace ID (optional — multi-workspace setups)
  workspaceId: ""
  # -- Tenant ID (optional — multi-tenant setups)
  tenantId: ""

# -- Collector identity
collectorName: "tfo-collector"
environment: production
datacenter: default

# -- Container image settings
image:
  repository: ghcr.io/telemetryflow/tfo-collector
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to Chart.appVersion

imagePullSecrets: []

# -- Number of collector replicas (scale horizontally for high-throughput)
replicaCount: 1

# -- Ports exposed by the collector
ports:
  otlpGrpc: 4317
  otlpHttp: 4318
  metrics: 8888
  prometheusExporter: 8889
  health: 13133
  zpages: 55679
  pprof: 1777

# -- Kubernetes Service settings
service:
  type: ClusterIP
  annotations: {}

# -- ServiceAccount settings
serviceAccount:
  create: true
  name: ""
  annotations: {}

# -- RBAC (ClusterRole + ClusterRoleBinding for k8sattributes processor)
rbac:
  create: true

# -- Pod-level security context (non-root, UID 10001)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# -- Resource limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# -- HorizontalPodAutoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# -- PodDisruptionBudget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# -- Persistent queue storage (emptyDir by default; set pvc.enabled=true for production)
queue:
  emptyDir:
    sizeLimit: 500Mi
  pvc:
    enabled: false
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi

# -- Node selector for all pods
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Annotations added to all pods
podAnnotations: {}

# -- Additional labels added to all resources
commonLabels: {}

# -- Extra environment variables injected into all collector containers
extraEnv: []
# - name: MY_VAR
#   value: "my-value"

# -- Collector configuration (rendered into ConfigMap)
config:
  extensions:
    health_check:
      endpoint: "0.0.0.0:13133"
    zpages:
      endpoint: "0.0.0.0:55679"
    pprof:
      endpoint: "0.0.0.0:1777"
    tfoauth:
      api_key_id: "${env:TELEMETRYFLOW_API_KEY_ID}"
      api_key_secret: "${env:TELEMETRYFLOW_API_KEY_SECRET}"
    tfoidentity:
      id: "${env:TELEMETRYFLOW_COLLECTOR_ID}"
      name: "${env:TELEMETRYFLOW_COLLECTOR_NAME}"
      description: "TFO Collector - Community Enterprise Observability Platform"
      tags:
        environment: "${env:TELEMETRYFLOW_ENVIRONMENT}"
        datacenter: "${env:TELEMETRYFLOW_DATACENTER}"
      enrich_resources: true

  receivers:
    tfootlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
          max_recv_msg_size_mib: 4
        http:
          endpoint: "0.0.0.0:4318"
          transport: tcp
          cors:
            allowed_origins:
              - "*"
            allowed_headers:
              - "*"
      enable_v2_endpoints: true
      v2_auth:
        required: true
        validate_secret: false

  processors:
    batch:
      timeout: 200ms
      send_batch_size: 8192
      send_batch_max_size: 0
    memory_limiter:
      check_interval: 1s
      limit_percentage: 80
      spike_limit_percentage: 25
    resource:
      attributes:
        - key: service.namespace
          value: telemetryflow
          action: upsert
        - key: deployment.environment
          value: "${env:TELEMETRYFLOW_ENVIRONMENT}"
          action: upsert
    k8sattributes:
      passthrough: false
      auth_type: serviceAccount
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: connection
      extract:
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.namespace.name
          - k8s.node.name
          - k8s.pod.start_time
        labels:
          - tag_name: app
            key: app
            from: pod
          - tag_name: version
            key: version
            from: pod
    # TFO-Agent: Normalize cAdvisor Prometheus-style metric names
    transform/cadvisor:
      error_mode: ignore
      metric_statements:
        - context: metric
          statements:
            # CPU
            - replace_pattern(name, "^container_cpu_usage_seconds_total$", "container.cadvisor.cpu.usage_seconds_total")
            - replace_pattern(name, "^container_cpu_system_seconds_total$", "container.cadvisor.cpu.system_seconds_total")
            - replace_pattern(name, "^container_cpu_user_seconds_total$", "container.cadvisor.cpu.user_seconds_total")
            - replace_pattern(name, "^container_cpu_cfs_throttled_seconds_total$", "container.cadvisor.cpu.cfs.throttled_seconds_total")
            - replace_pattern(name, "^container_cpu_cfs_periods_total$", "container.cadvisor.cpu.cfs.periods_total")
            - replace_pattern(name, "^container_cpu_cfs_throttled_periods_total$", "container.cadvisor.cpu.cfs.throttled_periods_total")
            # Memory
            - replace_pattern(name, "^container_memory_usage_bytes$", "container.cadvisor.memory.usage_bytes")
            - replace_pattern(name, "^container_memory_working_set_bytes$", "container.cadvisor.memory.working_set_bytes")
            - replace_pattern(name, "^container_memory_rss$", "container.cadvisor.memory.rss_bytes")
            - replace_pattern(name, "^container_memory_cache$", "container.cadvisor.memory.cache_bytes")
            - replace_pattern(name, "^container_memory_swap$", "container.cadvisor.memory.swap_bytes")
            - replace_pattern(name, "^container_memory_failures_total$", "container.cadvisor.memory.failures_total")
            # Network
            - replace_pattern(name, "^container_network_receive_bytes_total$", "container.cadvisor.network.receive_bytes_total")
            - replace_pattern(name, "^container_network_transmit_bytes_total$", "container.cadvisor.network.transmit_bytes_total")
            - replace_pattern(name, "^container_network_receive_errors_total$", "container.cadvisor.network.receive_errors_total")
            - replace_pattern(name, "^container_network_transmit_errors_total$", "container.cadvisor.network.transmit_errors_total")
            - replace_pattern(name, "^container_network_receive_packets_dropped_total$", "container.cadvisor.network.receive_drops_total")
            - replace_pattern(name, "^container_network_transmit_packets_dropped_total$", "container.cadvisor.network.transmit_drops_total")
            # Filesystem
            - replace_pattern(name, "^container_fs_usage_bytes$", "container.cadvisor.fs.usage_bytes")
            - replace_pattern(name, "^container_fs_limit_bytes$", "container.cadvisor.fs.limit_bytes")
            - replace_pattern(name, "^container_fs_reads_bytes_total$", "container.cadvisor.fs.read_bytes_total")
            - replace_pattern(name, "^container_fs_writes_bytes_total$", "container.cadvisor.fs.write_bytes_total")
            # Machine
            - replace_pattern(name, "^machine_cpu_cores$", "machine.cpu.cores")
            - replace_pattern(name, "^machine_memory_bytes$", "machine.memory.bytes")
            - replace_pattern(name, "^machine_cpu_cache_capacity_kilobytes$", "machine.cpu.cache.capacity_kilobytes")
    # TFO-Agent: Normalize Cilium Hubble Prometheus-style metric names
    transform/hubble:
      error_mode: ignore
      metric_statements:
        - context: metric
          statements:
            - replace_pattern(name, "^hubble_flows_processed_total$", "hubble.flows.processed_total")
            - replace_pattern(name, "^hubble_drop_total$", "hubble.drop_total")
            - replace_pattern(name, "^hubble_tcp_flags_total$", "hubble.tcp.flags_total")
            - replace_pattern(name, "^hubble_dns_queries_total$", "hubble.dns.queries_total")
            - replace_pattern(name, "^hubble_dns_responses_total$", "hubble.dns.responses_total")
            - replace_pattern(name, "^hubble_http_requests_total$", "hubble.http.requests_total")
            - replace_pattern(name, "^hubble_http_responses_total$", "hubble.http.responses_total")
            - replace_pattern(name, "^hubble_http_request_duration_seconds$", "hubble.http.request_duration_seconds")
    # TFO-Agent: Group Kubernetes metrics by resource identity
    groupbyattrs/k8s:
      keys:
        - k8s.cluster.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.pod.name
        - k8s.container.name
        - k8s.deployment.name
        - k8s.statefulset.name
        - k8s.daemonset.name
        - k8s.replicaset.name
        - k8s.job.name
        - k8s.cronjob.name
    # TFO-Agent: Tag all agent-sourced telemetry
    attributes/agent:
      actions:
        - key: tfo.source
          value: "tfo-agent"
          action: insert

  connectors:
    spanmetrics:
      histogram:
        explicit:
          buckets: [1ms, 5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
      dimensions:
        - name: http.method
          default: GET
        - name: http.status_code
        - name: http.route
        - name: rpc.method
        - name: rpc.service
      exemplars:
        enabled: true
      namespace: traces
      metrics_flush_interval: 15s
    servicegraph:
      latency_histogram_buckets: [1ms, 5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
      dimensions:
        - http.method
        - http.status_code
      store:
        ttl: 2s
        max_items: 1000
      cache_loop: 1s
      store_expiration_loop: 2s

  exporters:
    prometheus:
      endpoint: "0.0.0.0:8889"
      namespace: telemetryflow
      const_labels:
        collector: tfo-collector
      send_timestamps: true
      metric_expiration: 5m
      enable_open_metrics: true
      resource_to_telemetry_conversion:
        enabled: true
    tfo:
      endpoint: "${env:TELEMETRYFLOW_ENDPOINT}"
      use_v2_api: true
      auth:
        extension: tfoauth
      collector_identity: tfoidentity
      timeout: 30s
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 30s
        max_elapsed_time: 300s
      sending_queue:
        enabled: true
        num_consumers: 10
        queue_size: 1000

  service:
    extensions: [health_check, zpages, pprof, tfoauth, tfoidentity]
    pipelines:
      traces:
        receivers: [tfootlp]
        processors: [memory_limiter, k8sattributes, resource, attributes/agent, batch]
        exporters: [tfo, spanmetrics, servicegraph]
      # Metrics — all 16 TFO-Agent collectors + app metrics
      metrics:
        receivers: [tfootlp]
        processors:
          - memory_limiter
          - k8sattributes       # enrich app metrics with K8s context from connection
          - groupbyattrs/k8s    # scope K8s collector metrics to resource identity
          - resource            # add service.namespace, deployment.environment
          - transform/cadvisor  # normalize container_* / machine_* → container.cadvisor.*
          - transform/hubble    # normalize hubble_* → hubble.*
          - attributes/agent    # tag with tfo.source=tfo-agent
          - batch
        exporters: [tfo, prometheus]
      metrics/spanmetrics:
        receivers: [spanmetrics]
        processors: [memory_limiter, batch]
        exporters: [tfo, prometheus]
      metrics/servicegraph:
        receivers: [servicegraph]
        processors: [memory_limiter, batch]
        exporters: [tfo, prometheus]
      # Logs — pod container logs (k8s-pod-logs) + eBPF Hubble events
      logs:
        receivers: [tfootlp]
        processors:
          - memory_limiter
          - k8sattributes
          - resource
          - attributes/agent
          - batch
        exporters: [tfo]
    telemetry:
      logs:
        level: info
        encoding: json
      metrics:
        level: detailed
        readers:
          - pull:
              exporter:
                prometheus:
                  host: "0.0.0.0"
                  port: 8888
