  # InfluxDB exporter
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/influxdbexporter v0.146.1

  # ---------------------------------------------------------------------------
  # Logs Exporters
  # ---------------------------------------------------------------------------
  # Note: Loki exporter deprecated since July 2024 - use OTLP exporter to Loki instead
  # Loki now natively supports OTLP ingestion
  # File exporter
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/fileexporter v0.146.1

  # ---------------------------------------------------------------------------
  # Message Queue Exporters
  # ---------------------------------------------------------------------------
  # Kafka exporter
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/kafkaexporter v0.146.1
  # Pulsar exporter
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/pulsarexporter v0.146.1

