  # TelemetryFlow Custom Receiver
  # ---------------------------------------------------------------------------
  # TFO OTLP Receiver - supports v1 and v2 endpoints on same port
  - gomod: github.com/telemetryflow/telemetryflow-collector/components/tfootlpreceiver v1.1.2
    path: ./components/tfootlpreceiver

  # ---------------------------------------------------------------------------
  # Core OTLP Receiver (gRPC and HTTP)
  # ---------------------------------------------------------------------------
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.146.1

  # ---------------------------------------------------------------------------
  # Trace Receivers (Legacy Format Support)
  # ---------------------------------------------------------------------------
  # Jaeger receiver - supports Thrift and gRPC
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/jaegerreceiver v0.146.1
  # Zipkin receiver
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/zipkinreceiver v0.146.1
  # Note: OpenCensus receiver deprecated - use OTLP receiver instead
  # Note: Skywalking receiver deprecated - use OTLP receiver instead

  # ---------------------------------------------------------------------------
  # Metrics Receivers
  # ---------------------------------------------------------------------------
  # Host metrics receiver (CPU, memory, disk, network)
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/hostmetricsreceiver v0.146.1
  # Prometheus receiver - scrape Prometheus endpoints
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver v0.146.1
  # StatsD receiver - metrics from legacy apps
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/statsdreceiver v0.146.1
  # Carbon receiver - Graphite metrics (disabled due to download issues in v0.146.1)
  # - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/carbonreceiver v0.146.1
  # Collectd receiver
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/collectdreceiver v0.146.1
  # InfluxDB receiver
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/influxdbreceiver v0.146.1

  # ---------------------------------------------------------------------------
  # Log Receivers
  # ---------------------------------------------------------------------------
  # File log receiver - tail log files
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/filelogreceiver v0.146.1
  # Journald receiver - Linux systemd logs
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/journaldreceiver v0.146.1
  # Syslog receiver - RFC 3164/5424
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/syslogreceiver v0.146.1
  # TCP/UDP log receivers
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/tcplogreceiver v0.146.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/udplogreceiver v0.146.1
  # Windows Event Log receiver
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/windowseventlogreceiver v0.146.1
  # Fluentforward receiver - Fluentd/Fluent Bit
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/fluentforwardreceiver v0.146.1
  # CloudFoundry receiver
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/cloudfoundryreceiver v0.146.1

  # ---------------------------------------------------------------------------
  # Infrastructure Receivers
  # ---------------------------------------------------------------------------
  # Docker stats receiver
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/dockerstatsreceiver v0.146.1
  # Podman stats receiver
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/podmanreceiver v0.146.1

  # Kubernetes receivers
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8sclusterreceiver v0.146.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8seventsreceiver v0.146.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8sobjectsreceiver v0.146.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/kubeletstatsreceiver v0.146.1

  # ---------------------------------------------------------------------------
  # Message Queue Receivers
  # ---------------------------------------------------------------------------
  # Kafka receiver
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/kafkareceiver v0.146.1
  # Kafka metrics receiver
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/kafkametricsreceiver v0.146.1
  # RabbitMQ receiver
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/rabbitmqreceiver v0.146.1
