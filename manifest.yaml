  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/redisreceiver v0.146.1
  # Elasticsearch receiver
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/elasticsearchreceiver v0.146.1
  # SQL query receiver
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/sqlqueryreceiver v0.146.1

  # ---------------------------------------------------------------------------
