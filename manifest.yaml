# =============================================================================
# Processors - Transform, Sample, Enrich
# =============================================================================
processors:
  # ---------------------------------------------------------------------------
  # Core Processors
  # ---------------------------------------------------------------------------
  # Batch processor - batching for efficient export
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.146.1
  # Memory limiter processor - prevent OOM
  - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.146.1

  # ---------------------------------------------------------------------------
  # Attribute & Resource Processors
  # ---------------------------------------------------------------------------
  # Attributes processor - modify span/metric/log attributes
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/attributesprocessor v0.146.1
  # Resource processor - modify resource attributes
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/resourceprocessor v0.146.1
  # Resource detection processor - auto-detect cloud/host resources
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/resourcedetectionprocessor v0.146.1
  # K8s attributes processor - enrich with Kubernetes metadata
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/k8sattributesprocessor v0.146.1

  # ---------------------------------------------------------------------------
  # Filtering & Routing Processors
  # ---------------------------------------------------------------------------
  # Filter processor - filter telemetry
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/filterprocessor v0.146.1
  # Routing processor - route to different exporters (disabled due to download issues in v0.146.1)
  # - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/routingprocessor v0.146.1
  # Group by attributes processor
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/groupbyattrsprocessor v0.146.1
  # Group by trace processor - wait for complete traces
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/groupbytraceprocessor v0.146.1

  # ---------------------------------------------------------------------------
  # Sampling Processors
  # ---------------------------------------------------------------------------
  # Tail sampling processor - intelligent trace sampling
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/tailsamplingprocessor v0.146.1
  # Probabilistic sampling processor
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/probabilisticsamplerprocessor v0.146.1

  # ---------------------------------------------------------------------------
  # Transform Processors
  # ---------------------------------------------------------------------------
  # Transform processor - OTTL-based transformation
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/transformprocessor v0.146.1
  # Metrics transform processor - rename, aggregate metrics
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/metricstransformprocessor v0.146.1
  # Span processor - rename spans, extract attributes
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/spanprocessor v0.146.1
  # Log transform processor
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/logstransformprocessor v0.146.1

  # ---------------------------------------------------------------------------
  # Metrics Conversion Processors
  # ---------------------------------------------------------------------------
  # Cumulative to delta processor
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/cumulativetodeltaprocessor v0.146.1
  # Delta to rate processor
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/deltatocumulativeprocessor v0.146.1
  # Metrics generation processor - derive metrics
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/metricsgenerationprocessor v0.146.1
  # Interval processor - aggregate metrics over time
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/intervalprocessor v0.146.1

  # ---------------------------------------------------------------------------
  # Security Processors
  # ---------------------------------------------------------------------------
  # Redaction processor - remove sensitive data
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/redactionprocessor v0.146.1

  # ---------------------------------------------------------------------------
  # Experimental/Utility Processors
  # ---------------------------------------------------------------------------
  # GeoIP processor - add geographic info
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/geoipprocessor v0.146.1

# =============================================================================
# Exporters - Send to Backends
# =============================================================================
exporters:
  # ---------------------------------------------------------------------------
  # TelemetryFlow Custom Exporter
  # ---------------------------------------------------------------------------
  # TFO Exporter - auto-injects TFO auth headers, supports v2 API
  - gomod: github.com/telemetryflow/telemetryflow-collector/components/tfoexporter v1.1.2
    path: ./components/tfoexporter

  # ---------------------------------------------------------------------------
  # Core OTLP Exporters
  # ---------------------------------------------------------------------------
  # OTLP exporter (gRPC)
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.146.1
  # OTLP HTTP exporter
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.146.1
  # Debug exporter
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.146.1
  # Nop exporter (for testing)
  - gomod: go.opentelemetry.io/collector/exporter/nopexporter v0.146.1

  # ---------------------------------------------------------------------------
  # Legacy Trace Exporters
  # ---------------------------------------------------------------------------
  # Zipkin exporter
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/zipkinexporter v0.146.1
  # Note: OpenCensus exporter deprecated - use OTLP exporter instead (removed in v0.134.0)
  # Note: Skywalking exporter deprecated - use OTLP exporter to Skywalking instead
  # Note: Jaeger exporter deprecated - use OTLP exporter to Jaeger instead

  # ---------------------------------------------------------------------------
  # Metrics Exporters
  # ---------------------------------------------------------------------------
  # Prometheus exporter - expose metrics endpoint
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/prometheusexporter v0.146.1
  # Prometheus remote write exporter
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/prometheusremotewriteexporter v0.146.1
