# TelemetryFlow Collector - OpenTelemetry Collector Builder Manifest
#
# TelemetryFlow Collector - Community Enterprise Observability Platform (CEOP)
# Copyright (c) 2024-2026 DevOpsCorner Indonesia. All rights reserved.
#
# This manifest defines the components to include in the TelemetryFlow Collector
# distribution based on OpenTelemetry Collector Community.
#
# Features:
# - Full OTEL capabilities: Metrics, Logs, Traces, Exemplars
# - Legacy format support: Jaeger, Zipkin, StatsD
# - Cloud provider integration: AWS, GCP, Azure
# - Database & infrastructure monitoring
# - Advanced sampling and routing
#
# Build with: ocb --config manifest.yaml
#
# =============================================================================
# DISABLED COMPONENTS (v0.146.1)
# =============================================================================
# The following components are temporarily disabled due to Go module download
# issues in OpenTelemetry Collector Contrib v0.146.1:
#
# Receivers:
#   - carbonreceiver: "unknown revision receiver/carbonreceiver/v0.146.1"
#
# Processors:
#   - routingprocessor: "unknown revision processor/routingprocessor/v0.146.1"
#
# Exporters:
#   - carbonexporter: "unknown revision exporter/carbonexporter/v0.146.1"
#
# Connectors:
#   - routingconnector: "unknown revision connector/routingconnector/v0.146.1"
#   - failoverconnector: "unknown revision connector/failoverconnector/v0.146.1"
#
# These components may be re-enabled when the upstream issues are resolved.
# Track: https://github.com/open-telemetry/opentelemetry-collector-contrib
#
# =============================================================================
# DEPRECATED COMPONENTS (removed from contrib)
# =============================================================================
# The following components have been deprecated and removed from the
# OpenTelemetry Collector Contrib repository:
#
# Receivers:
#   - opencensusreceiver: Deprecated - use OTLP receiver instead
#   - skywalkingexporter: Deprecated - use OTLP exporter instead
#
# Exporters:
#   - jaegerexporter: Deprecated in v0.134.0 - use OTLP exporter to Jaeger
#   - opencensusexporter: Deprecated - use OTLP exporter instead
#   - skywalkingexporter: Deprecated - use OTLP exporter to Skywalking
#   - lokiexporter: Deprecated July 2024 - Loki now supports OTLP natively
#   - newrelicexporter: Deprecated - use OTLP exporter to New Relic
#   - dynatraceexporter: Temporarily disabled due to version issues
#
# =============================================================================

dist:
  name: tfo-collector
  description: TelemetryFlow Collector - Community Enterprise Observability Platform (CEOP)
  output_path: ./build
  module: github.com/telemetryflow/telemetryflow-collector
  # Skip compilation - we build manually with custom main.go
  skip_compilation: true

# =============================================================================
# Extensions
# =============================================================================
extensions:
  # ---------------------------------------------------------------------------
  # TelemetryFlow Custom Extensions
  # ---------------------------------------------------------------------------
  # TFO Auth Extension - centralized API key management
  - gomod: github.com/telemetryflow/telemetryflow-collector/components/extension/tfoauthextension v1.1.2
    path: ./components/extension/tfoauthextension
  # TFO Identity Extension - collector identity management
  - gomod: github.com/telemetryflow/telemetryflow-collector/components/extension/tfoidentityextension v1.1.2
    path: ./components/extension/tfoidentityextension

  # ---------------------------------------------------------------------------
  # Core Extensions
  # ---------------------------------------------------------------------------
  - gomod: go.opentelemetry.io/collector/extension/zpagesextension v0.146.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckextension v0.146.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/pprofextension v0.146.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/storage/filestorage v0.146.1

  # Authentication extensions
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/basicauthextension v0.146.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/bearertokenauthextension v0.146.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/headerssetterextension v0.146.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/oauth2clientauthextension v0.146.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/oidcauthextension v0.146.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/sigv4authextension v0.146.1

  # Encoding extensions
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/encoding/jsonlogencodingextension v0.146.1
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/encoding/textencodingextension v0.146.1

# =============================================================================
# Receivers - Metrics, Logs, Traces
# =============================================================================
receivers:
