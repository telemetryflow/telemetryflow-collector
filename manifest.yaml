# =============================================================================
# Connectors - Pipeline Bridging & Exemplars
# =============================================================================
connectors:
  # ---------------------------------------------------------------------------
  # Core Connectors
  # ---------------------------------------------------------------------------
  # Forward connector - pass data between pipelines
  - gomod: go.opentelemetry.io/collector/connector/forwardconnector v0.146.1

  # ---------------------------------------------------------------------------
  # Metrics Connectors
  # ---------------------------------------------------------------------------
  # Count connector - count signals
