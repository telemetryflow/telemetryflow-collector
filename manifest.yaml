  # Google Cloud Pub/Sub exporter
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/googlecloudpubsubexporter v0.146.1
  # Azure Monitor exporter
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/azuremonitorexporter v0.146.1
  # Azure Data Explorer exporter
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/azuredataexplorerexporter v0.146.1

  # ---------------------------------------------------------------------------
