  # Elasticsearch exporter
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/elasticsearchexporter v0.146.1
  # ClickHouse exporter - analytics
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/clickhouseexporter v0.146.1
  # Cassandra exporter
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/cassandraexporter v0.146.1

  # ---------------------------------------------------------------------------
  # Cloud Provider Exporters
  # ---------------------------------------------------------------------------
  # AWS CloudWatch EMF exporter
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/awsemfexporter v0.146.1
  # AWS X-Ray exporter
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/awsxrayexporter v0.146.1
  # AWS CloudWatch Logs exporter
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/awscloudwatchlogsexporter v0.146.1
  # AWS Kinesis exporter
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/awskinesisexporter v0.146.1
